<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Selector de idioma desplegable -->
        <div class="language-selector">
            <span class="lang-label">Language:</span>
            <select id="languageSelect">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="zh">中文</option>
            </select>
        </div>
        
        <header>
            <h1>TaskMaster Pro</h1>
            <p>Gestion profesional de tareas</p>
        </header>
        
        <div class="stats-panel" id="statsPanel">
            <div class="stat-card">
                <span class="stat-number" id="totalTasks">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="completedTasks">0</span>
                <span class="stat-label">Completadas</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="pendingTasks">0</span>
                <span class="stat-label">Pendientes</span>
            </div>
        </div>
        
        <div class="task-form">
            <h2>Nueva Tarea</h2>
            <form id="taskForm">
                <div class="form-group">
                    <input type="text" id="title" placeholder="Titulo de la tarea *" required maxlength="100">
                </div>
                <div class="form-group">
                    <textarea id="description" placeholder="Descripcion (opcional)" maxlength="500"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <select id="priority">
                            <option value="low">Baja</option>
                            <option value="medium" selected>Media</option>
                            <option value="high">Alta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" id="category" placeholder="Categoria" value="general" maxlength="50">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Crear Tarea</button>
            </form>
        </div>
        
        <div class="filters">
            <h3>Filtros</h3>
            <div class="filter-row">
                <select id="filterStatus">
                    <option value="">Todos los estados</option>
                    <option value="true">Completadas</option>
                    <option value="false">Pendientes</option>
                </select>
                <select id="filterPriority">
                    <option value="">Todas las prioridades</option>
                    <option value="low">Baja</option>
                    <option value="medium">Media</option>
                    <option value="high">Alta</option>
                </select>
                <input type="text" id="searchText" placeholder="Buscar...">
                <button onclick="loadTasks()" class="btn-secondary">Actualizar</button>
            </div>
        </div>
        
        <div class="tasks-container">
            <h2>Mis Tareas</h2>
            <div id="tasksList" class="tasks-list">
                <p class="empty-state">No hay tareas. Crea una nueva!</p>
            </div>
        </div>
    </div>
    
    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
